<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffd166" />
  <title>El juego de hablar de Daniela</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/icono-192.png" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>

  <!-- ===================== CABECERA ===================== -->
  <header class="cabecera">
    <div id="estrellas" class="estrellas">·····</div>
    <button id="boton-ajustes" class="icono-ajustes" aria-label="Ajustes para el adulto">⚙️</button>
  </header>

  <!-- ===================== JUEGO ===================== -->
  <main class="juego">
    <div id="tarjeta" class="tarjeta">
      <img id="pictograma" class="pictograma" src="" alt="" />
      <div id="palabra" class="palabra">SOL</div>
    </div>

    <p id="estado" class="estado">Toca el micro y di la palabra</p>

    <button id="boton-mic" class="boton-mic" aria-label="Hablar">
      <span class="mic-emoji">🎤</span>
      <span class="ondas"></span>
    </button>

    <!-- Botones pequeños para el adulto (siempre visibles, abajo) -->
    <div class="barra-adulto">
      <button id="boton-oir" class="mini" aria-label="Oír la palabra">🔊 Oír</button>
      <button id="boton-correcto" class="mini verde" aria-label="Lo dijo bien">✓ ¡Bien!</button>
      <button id="boton-saltar" class="mini" aria-label="Siguiente">⏭️ Otra</button>
    </div>
  </main>

  <!-- ===================== CELEBRACIÓN ===================== -->
  <div id="feedback" class="feedback">🎉</div>

  <!-- ===================== RECOMPENSA: GLOBO ===================== -->
  <div id="globo-capa" class="globo-capa">
    <div id="globo-vuelo" class="globo-vuelo">
      <button id="globo" class="globo" aria-label="Explota el globo">🎈</button>
    </div>
  </div>

  <!-- ===================== PANEL DEL ADULTO ===================== -->
  <aside id="panel" class="panel">
    <div class="panel-contenido">
      <div class="panel-cabecera">
        <h2>Ajustes (para papá)</h2>
        <button id="cerrar-panel" class="cerrar" aria-label="Cerrar">✕</button>
      </div>

      <h3>✨ Diversión máxima</h3>
      <div id="opciones-diversion" class="opciones"></div>

      <h3>Modo de juego</h3>
      <div id="opciones-modo" class="opciones"></div>

      <div id="seccion-silabas">
        <h3>Número de sílabas</h3>
        <div id="opciones-silabas" class="opciones"></div>

        <h3>Tipo de sílaba</h3>
        <div id="opciones-tipo" class="opciones"></div>
      </div>

      <div id="seccion-categorias">
        <h3>Campos semánticos</h3>
        <div id="opciones-categoria" class="opciones"></div>
      </div>

      <h3>Nivel de exigencia de la voz</h3>
      <div id="opciones-nivel" class="opciones"></div>

      <p id="aviso-micro" class="aviso"></p>

      <p class="creditos">
        Pictogramas: ARASAAC (arasaac.org) · Autor: Sergio Palao ·
        Gobierno de Aragón · Licencia CC BY-NC-SA.
      </p>
    </div>
  </aside>

  <script type="module" src="js/app.js"></script>
  <script>
    // Registra el service worker (para que funcione sin internet, opcional)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
